<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Blocking script to prevent theme flickering -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
                document.body?.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="top-bar">
                <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">🌙</button>
            </div>
            <h1>Lotto Number Generator</h1>
            <p class="subtitle">Generate your lucky numbers with one click!</p>
        </header>
        
        <div class="lotto-numbers" id="lotto-display">
            <!-- Numbers will be generated here -->
        </div>

        <div class="controls">
            <button id="generate-btn">Generate Lucky Numbers</button>
        </div>

        <section class="partnership-section">
            <hr>
            <h2>Partnership Inquiry</h2>
            <p class="form-desc">Interested in collaborating? Send us a message!</p>
            <form action="https://formspree.io/f/mvzlgwel" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>
        <section class="comments-section">
            <hr>
            <h2>Comments</h2>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = 'lotto-generator-home'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://aimhigh-max.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>

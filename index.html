<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Animal Face Test (Dog or Cat?)</title>
    <meta name="google-adsense-account" content="ca-pub-1670359000913052">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1670359000913052"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="top-bar">
                <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">🌙</button>
            </div>
            <h1>🐾 Animal Face Test</h1>
            <p class="subtitle">Are you more like a Dog or a Cat?</p>
        </header>

        <main class="test-area">
            <!-- Animal Face Test content... -->
            <div id="upload-container" class="upload-box">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <label for="image-upload" class="upload-label">
                    <span class="upload-icon">📸</span>
                    <span class="upload-text">Upload Photo or Click to Start</span>
                </label>
            </div>
            
            <div id="webcam-container" class="video-container" style="display: none;"></div>
            
            <div id="loading" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing face...</p>
            </div>

            <div id="result-container" class="result-box" style="display: none;">
                <img id="face-image" src="" alt="Your face" style="display: none; max-width: 100%; border-radius: 15px; margin-bottom: 20px;">
                <div id="label-container"></div>
                <button id="restart-btn" class="secondary-btn">Try Again</button>
            </div>

            <div class="controls">
                <button id="start-webcam-btn">Use Webcam</button>
            </div>
        </main>

        <section class="lotto-section">
            <hr>
            <h2>🎰 Lucky Lotto Generator</h2>
            <p class="subtitle">Get your lucky numbers for today!</p>
            <div class="lotto-numbers" id="lotto-display">
                <!-- Lotto numbers will appear here -->
            </div>
            <button id="generate-lotto-btn" class="primary-btn">Generate Numbers</button>
        </section>

        <section class="partnership-section">
            <hr>
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mvzlgwel" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>

        <section class="comments-section">
            <hr>
            <h2>Comments</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://aimhigh-max.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </section>
    </div>

    <!-- TensorFlow.js and Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | 🐾 AI & 🎰 Lotto</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">🐾 AI & 🎰 Lotto</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">🌙</button>
        </nav>
    </header>

    <div class="container">
        <section class="content-page">
            <h1>Contact Us</h1>
            <p>Have questions, suggestions, or partnership inquiries? We'd love to hear from you!</p>
            
            <form action="https://formspree.io/f/mvzlgwel" method="POST" id="contact-form" class="mt-2">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" class="submit-btn primary-btn">Send Message</button>
            </form>
        </section>
    </div>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-info">
                <p>&copy; 2026 AI & Lotto. All rights reserved.</p>
            </div>
            <ul class="footer-links">
                <li><a href="about.html">About Us</a></li>
                <li><a href="privacy.html">Privacy Policy</a></li>
                <li><a href="terms.html">Terms of Service</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
